<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Recommendation System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="main">
        <h1>🎬 Sistema de Recomendação de Filmes</h1>
        <p class="text-muted">Powered by TensorFlow.js + pgvector (PostgreSQL)</p>

        <div class="row mt-3">
            <!-- Perfil do Usuário -->
            <div class="col-md-4">
                <div class="card mb-4">
                    <div class="card-header">
                        <h4>Perfil do Usuário</h4>
                    </div>
                    <div class="card-body">
                        <form id="userForm">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="userSelect" class="form-label">Selecionar Usuário</label>
                                    <select class="form-select" id="userSelect">
                                        <option value="">-- Selecione um usuário --</option>
                                    </select>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label for="userAge" class="form-label">Idade</label>
                                    <input type="number" class="form-control" id="userAge" disabled>
                                </div>
                            </div>
                        </form>

                        <div id="pastWatchedContainer" class="mt-4">
                            <h5>Filmes Assistidos</h5>
                            <div id="pastWatchedList" class="row"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Painel de Treinamento -->
            <div class="col-md-4">
                <div class="card mb-4">
                    <div class="card-header">
                        <h4>Modelo de Recomendação</h4>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="model-controls d-flex gap-2">
                                <button id="trainModelBtn" class="btn btn-primary train-model-btn">
                                    <i class="bi bi-cpu"></i> Treinar Modelo
                                </button>
                                <button disabled id="runRecommendationBtn" class="btn btn-success train-model-btn">
                                    <i class="bi bi-stars"></i> Recomendar Filmes
                                </button>
                            </div>
                        </div>

                        <div class="all-users-watched mt-3">
                            <h5 id="watchedDiv" style="cursor: pointer;">
                                Histórico de todos os usuários
                                <i id="watchedArrow" class="bi bi-chevron-down"></i>
                            </h5>
                            <div id="allUsersWatchedList" class="user-watched-data overflow-auto"
                                style="max-height: 400px; display: none;">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <h3>Filmes</h3>
        <div class="row" id="movieList"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-vis@1.5.1/dist/tfjs-vis.umd.min.js"></script>
    <script type="module" src="./src/index.js"></script>
</body>

</html>
